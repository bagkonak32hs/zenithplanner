<li data-tr="Alışkanlık ve hedef takip bilgileri"
    data-en="Habit and goal tracking data"
    data-es="Datos de seguimiento de hábitos y objetivos"></li>

<li data-tr="Uygulama kullanım istatistikleri (anonim)"

    data-es="Estadísticas de uso anónimas"></li>

data-tr="Verilerin Kullanım Amaçları"

<p 
data-tr="Toplanan veriler aşağıdaki amaçlarla kullanılır:"

</p>

<ul>
<li data-tr="Uygulama işlevlerini sağlamak"
    data-en="Providing app functionality"
    data-es="Proporcionar funcionalidad de la aplicación"></li>

<li data-tr="Kullanıcı deneyimini geliştirmek"
    data-en="Improving user experience"
    data-es="Mejorar la experiencia del usuario"></li>

<li data-tr="Hata analizi ve performans iyileştirme"
    data-en="Error analysis and performance improvement"
    data-es="Análisis de errores y mejora del rendimiento"></li>

    data-en="Providing personalized content"
    data-es="Ofrecer contenido personalizado"></li>
</ul>

    <h2 
data-tr="Ödeme ve Abonelik"
data-en="Payments and Subscriptions"
data-es="Pagos y Suscripciones">
</h2>

<p 
data-tr="Uygulama içerisinde sunulan premium özellikler abonelik modeli ile sunulabilir."

</p>

<p

data-en="All payments are securely processed by Google Play. The app does not collect or store your credit card or payment information."
data-es="Todos los pagos son procesados de forma segura por Google Play. La aplicación no recopila ni almacena información de pago.">
</p>

    <h2 
data-tr="Veri Güvenliği"

</h2>

data-tr="Verilerinizin korunması için uygun teknik ve idari güvenlik önlemleri alınmaktadır."
data-en="Appropriate technical and organizational measures are taken to protect your data."
data-es="Se toman medidas técnicas y organizativas para proteger sus datos.">
</p>

<p

data-en="However, no method of transmission over the Internet is 100% secure."
data-es="Sin embargo, ningún método de transmisión en Internet es completamente seguro.">
</p>

data-tr="Veri Paylaşımı"

data-es="Compartición de Datos">
</h2>

<p 
data-tr="Kullanıcı verileri üçüncü taraflarla satılmaz veya pazarlanmaz."
data-en="User data is not sold or marketed to third parties."
data-es="Los datos del usuario no se venden ni se comercializan.">
</p>

<p 
data-tr="Yalnızca yasal zorunluluklar halinde yetkili kurumlarla paylaşılabilir."
data-en="Data may be shared with authorities only when legally required."
data-es="Los datos pueden compartirse con autoridades solo cuando sea requerido por ley.">
</p>

data-tr="Çocukların Gizliliği"

data-es="Privacidad de los Niños">

data-tr="Uygulama 13 yaş altındaki çocukları hedeflemez ve bilerek veri toplamaz."

<script>
function changeLang(lang) {
  document.documentElement.lang = lang;

  document.querySelectorAll("[data-tr]").forEach(el => {
    el.textContent = el.getAttribute("data-" + lang);
  });
}

// Default Türkçe
changeLang("tr");
</script>

</body>
