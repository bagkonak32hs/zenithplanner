<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zenith Planner | Privacy Policy</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="lang-switch">
  <select onchange="changeLang(this.value)">
    <option value="tr">🇹🇷 Türkçe</option>
    <option value="en">🇬🇧 English</option>
    <option value="es">🇪🇸 Español</option>
  </select>
</div>

<main class="container">
  <section class="card">

    <div class="logo-area">
      <div class="logo"><span>Z</span></div>
      <h1>Zenith Planner</h1>
      <p class="subtitle" data-tr="Premium Dijital Ajanda" data-en="Premium Digital Planner" data-es="Agenda Digital Premium"></p>
    </div>

    <h2 data-tr="Gizlilik Politikası" data-en="Privacy Policy" data-es="Política de Privacidad"></h2>
    <p class="date">04 May 2026</p>

    <p data-tr="Bu politika kullanıcı verilerinin nasıl işlendiğini açıklar."
       data-en="This policy explains how user data is handled."
       data-es="Esta política explica cómo se manejan los datos del usuario."></p>

    <h2 data-tr="Toplanan Veriler" data-en="Collected Data" data-es="Datos Recopilados"></h2>
    <p data-tr="Görevler, notlar ve planlama verileri toplanabilir."
       data-en="Tasks, notes and planning data may be collected."
       data-es="Se pueden recopilar tareas, notas y datos de planificación."></p>

    <h2 data-tr="Ödeme Sistemi" data-en="Payments" data-es="Pagos"></h2>
    <p data-tr="Ödemeler Google Play üzerinden yapılır."
       data-en="Payments are handled via Google Play."
       data-es="Los pagos se gestionan a través de Google Play."></p>

    <h2 data-tr="İletişim" data-en="Contact" data-es="Contacto"></h2>
    <p class="contact">
      <a href="mailto:info@greendevcode.com">info@greendevcode.com</a>
    </p>

    <footer data-tr="Tüm hakları saklıdır."
            data-en="All rights reserved."
            data-es="Todos los derechos reservados."></footer>

  </section>
</main>

<script>
function changeLang(lang) {
  document.documentElement.lang = lang;

  document.querySelectorAll("[data-tr]").forEach(el => {
    el.textContent = el.getAttribute("data-" + lang);
  });
}

// Default Türkçe
changeLang("tr");
</script>

</body>
</html>
